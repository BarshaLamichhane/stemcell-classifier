<div class="card" *ngIf="data">
  <h2>Result</h2>

  <div class="row">
    <div class="col">
      <h3>Original</h3>
      <img [src]="data.original_base64" *ngIf="data.original_base64" />
    </div>

    <div class="col">
      <h3>Prediction</h3>
      <p *ngIf="data.class_label"><strong>{{ data.class_label }}</strong></p>
      <p *ngIf="data.confidence !== undefined">Confidence: {{ (data.confidence*100) | number:'1.0-0' }}%</p>
      <div *ngIf="data.probabilities">
        Probabilities: <pre>{{ data.probabilities | json }}</pre>
      </div>
    </div>
  </div>

  <h4>Mask / Overlay</h4>
  <img *ngIf="data.mask_base64" [src]="data.mask_base64" />

  <h4>Similar images</h4>
  <div class="similar">
    <img *ngFor="let s of similarImages" [src]="s" />
  </div>

  <div *ngIf="loadingSimilar">Loading similar images…</div>
</div>
