<!-- CLASSIFY CARD -->
<div class="card mt-4 p-4 shadow-sm border-0" style="background: #f8fbff;">

  <h5 class="mb-3 fw-bold text-primary">
    Classify Blood Cells
  </h5>

  <!-- SINGLE ROW CONTROLS -->
  <div class="row g-2 align-items-end">

    <!-- CELL TYPE -->
    <div class="col-md-4">
      <label class="form-label fw-semibold">Cell Type</label>
      <select [(ngModel)]="selectedCellType" class="form-select">
        <option value="EOSINOPHIL">EOSINOPHIL</option>
        <option value="LYMPHOCYTE">LYMPHOCYTE</option>
        <option value="MONOCYTE">MONOCYTE</option>
        <option value="NEUTROPHIL">NEUTROPHIL</option>
      </select>
    </div>

    <!-- THRESHOLD SLIDER -->
    <div class="col-md-5">
      <label class="form-label fw-semibold">
        Threshold: <span class="text-primary">{{ threshold * 100 | number:'1.0-0' }}%</span>
      </label>

      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        [(ngModel)]="threshold"
        class="form-range"
      />

      <div class="d-flex justify-content-between small text-muted">
        <span>0%</span>
        <span>50%</span>
        <span>100%</span>
      </div>
    </div>

    <!-- CLASSIFY BUTTON -->
    <div class="col-md-3">
      <button
        class="btn btn-primary w-100 py-2 fw-semibold shadow-sm"
        style="background: linear-gradient(135deg,#3b82f6,#2563eb); border: none;"
        (click)="filter()"
      >
        Classify
      </button>
    </div>

  </div>


  <div *ngIf="filterResults.length === 0 && !(loading$ | async)">
  <p class="text-muted">No results yet. Run filter.</p>
</div>


<div *ngIf="filterResults.length > 0" class="mt-4">

  <h5 class="fw-bold text-secondary mb-3">
    Matches
  </h5>

  <div class="row g-3">

    <div class="col-md-4" *ngFor="let item of filterResults">

      <div class="card border-0 shadow-sm h-100 result-card">

        <!-- IMAGE -->
        <div class="image-container">
          <img
            [src]="item.image_url"
            class="card-img-top result-img"
          />
        </div>

        <!-- BODY -->
        <div class="card-body text-center">

          <h6 class="fw-bold text-primary mb-1">
            {{ item.predicted_class }}
          </h6>

          <!-- CONFIDENCE BADGE -->
          <span class="badge rounded-pill px-3 py-2"
                [ngClass]="{
                  'bg-info': item.confidence >= 0.3,
                  'bg-warning text-dark': item.confidence >= 0.1 && item.confidence < 0.2,
                  'bg-secondary': item.confidence < 0.1
                }">
            Confidence score : {{ item.confidence * 100 | number:'1.0-1' }}%
          </span>

          <!-- PROGRESS BAR -->
          <div class="progress mt-3" style="height: 6px;">
            <div
              class="progress-bar"
              [style.width.%]="item.confidence * 100"
              [ngClass]="{
                'bg-info': item.confidence >= 0.3,
                'bg-warning text-dark': item.confidence >= 0.1 && item.confidence < 0.2,
                'bg-secondary': item.confidence < 0.1
              }">
            </div>
          </div>

        </div>

      </div>

    </div>

  </div>
</div>


</div>
